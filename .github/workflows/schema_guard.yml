# Schema Guard — place in pet-schema/.github/workflows/schema_guard.yml
name: Schema Guard

on:
  push:
    branches: [main]

jobs:
  trigger-downstream:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - pet-data
          - pet-annotation
          - pet-train
          - pet-eval
          - pet-quantize
          - pet-ota
          # pet-id: added 2026-04-23; requires schema_validate.yml in pet-id (see Phase 9 task)
          - pet-id
    steps:
      - name: Dispatch to ${{ matrix.repo }}
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository: Train-Pet-Pipeline/${{ matrix.repo }}
          event-type: schema-updated
